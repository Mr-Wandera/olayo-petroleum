version: '3.8'

services:
  olayo-postgres:
    image: postgres:15-alpine
    container_name: olayopetroleum_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-olayo_petroleum}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  olayo-redis:
    image: redis:7-alpine
    container_name: olayopetroleum_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-OlayoTelemetryPass}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  olayo-backend:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
    container_name: olayopetroleum_api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - ENV=production
      - PORT=3000
      - DB_HOST=olayo-postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_NAME=${DB_NAME:-olayo_petroleum}
      - REDIS_HOST=olayo-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-OlayoTelemetryPass}
      - GIN_MODE=release
      - JWT_SECRET=${JWT_SECRET:-9fa8sdgkjh30q87gdasjkhasd8u91}
    depends_on:
      olayo-postgres:
        condition: service_healthy
      olayo-redis:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:latest
    container_name: olayopetroleum_prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
